[DEFAULT]
ConnectionType=initiator
HeartBtInt=30
ReconnectInterval=5
FileStorePath=target/data/client
ScreenLogShowIncoming=Y
ScreenLogShowOutgoing=Y
ScreenLogEvents=Y
UseDataDictionary=Y
# We will disable data dictionary validation for the tests to keep them simple
# Actually, the server checks dictionary, so we should keep it. QuickFIX/J has FIX44.xml built-in in its jar.
# If not available, we can just set UseDataDictionary=N for test stability if we are perfectly forming our POJOs
UseDataDictionary=N

[SESSION]
BeginString=FIX.4.4
SenderCompID=MINIFIX_CLIENT
TargetCompID=EXEC_SERVER
SocketConnectHost=localhost
SocketConnectPort=9876
StartTime=00:00:00
EndTime=00:00:00
ResetOnLogon=Y
